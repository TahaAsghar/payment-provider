# Alembic configuration for async PostgreSQL migrations.

[alembic]
# Path to migration scripts — relative to this file.
script_location = alembic

# Template used to generate migration file names.
# Uncomment the line below if you want a datestamp prefix:
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Connection string is overridden at runtime by env.py but kept here
# as a fallback / documentation.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/payment_service

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
